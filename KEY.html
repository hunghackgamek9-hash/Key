<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VB KEY</title>
</head>
<body>

<h2>KEY HÔM NAY</h2>

<button onclick="getKey()">Lấy Key</button>

<p id="msg"></p>

<script>
async function getKey() {

    const response = await fetch("key.txt");
    const key = await response.text();

    document.getElementById("msg").innerHTML =
        "Key của bạn: <b>" + key + "</b>";
}
</script>

</body>
</html>
